<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroGeneration | 青年心脑联盟</title>
    <style>
        /* =========================================
           NG 核心配色方案 
           ========================================= */
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --accent-cyan: #4faed8; 
            --accent-pink: #df4d85; 
            --sub-text: #9ca3af;
            --card-bg: rgba(255, 255, 255, 0.04);
            --border-color: rgba(255, 255, 255, 0.08);
            
            /* =========================================
               高定字体库配置
               - 中文默认宋体，英文默认 Times New Roman (古典学术感)
               - Logo 独享无衬线极粗现代体 (力量感)
               ========================================= */
            --font-academic: "Times New Roman", Times, "Songti SC", "SimSun", serif;
            --font-logo: "Impact", "Arial Black", -apple-system, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-academic);
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.8;
            overflow-x: hidden;
        }

        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: 
                radial-gradient(circle at 10% 20%, rgba(79, 174, 216, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(223, 77, 133, 0.08) 0%, transparent 40%);
            z-index: -1;
            pointer-events: none;
        }

        /* 导航栏 */
        header {
            width: 100%;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            height: 45px;
        }

        .logo-img {
            height: 100%;
            width: auto;
            object-fit: contain;
            border-radius: 50%;
        }

        /* 完美还原 image_7a2211.png 中的极粗无衬线科技感字体 */
        .logo-text {
            font-family: var(--font-logo);
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        nav a {
            color: var(--sub-text);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: color 0.3s;
        }

        nav a:hover, nav a.active {
            color: var(--accent-cyan);
        }

        .lang-btn {
            background: transparent;
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-family: var(--font-academic);
            font-weight: 600;
            transition: all 0.3s;
        }

        .lang-btn:hover {
            background: var(--accent-cyan);
            color: #000000;
            box-shadow: 0 0 10px rgba(79, 174, 216, 0.5);
        }

        /* Hero 区域 */
        .hero {
            max-width: 1200px;
            margin: 0 auto;
            padding: 100px 20px 40px 20px;
            text-align: center;
        }

        .badge {
            display: inline-block;
            padding: 6px 18px;
            background: rgba(79, 174, 216, 0.1);
            border: 1px solid rgba(79, 174, 216, 0.3);
            color: var(--accent-cyan);
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 25px;
            letter-spacing: 1.5px;
        }

        .hero h1 {
            font-size: 46px;
            font-weight: bold;
            line-height: 1.4;
            margin-bottom: 25px;
        }

        .hero h1 span.cyan-text { color: var(--accent-cyan); }
        .hero h1 span.pink-text { color: var(--accent-pink); }
